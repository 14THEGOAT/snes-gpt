# LoROM linker configuration for SNES GPT
# ca65/ld65 (cc65 toolchain)
#
# LoROM memory map:
#   Banks $00-$3F: ROM at $8000-$FFFF (32KB per bank)
#   Bank $00: WRAM at $0000-$1FFF
#   Bank $7E-$7F: Full 128KB WRAM

MEMORY {
    # Zero page: fast 8-bit addressed variables
    ZP:     start = $00,    size = $0100, type = rw, define = yes;

    # Hardware stack
    STACK:  start = $0100,  size = $0100, type = rw, define = yes;

    # BSS / working RAM
    BSS:    start = $0200,  size = $1E00, type = rw, define = yes;

    # ROM bank 0: code + data at $8000-$FFFF
    ROM0:   start = $8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp;
    BSS:        load = BSS,   type = bss;
    CODE:       load = ROM0,  type = ro,  start = $8000;
    RODATA:     load = ROM0,  type = ro;
    HEADER:     load = ROM0,  type = ro,  start = $FFC0;
    VECTORS:    load = ROM0,  type = ro,  start = $FFE0;
}
